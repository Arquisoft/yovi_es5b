sonar.organization=arquisoft
sonar.host.url=https://sonarcloud.io
sonar.projectKey=Arquisoft_yovi_es5b
sonar.projectName=yovi_es5b

sonar.sources=webapp/src,users,gamey/src
sonar.tests=webapp/src,users/__tests__,gamey/src
sonar.test.inclusions=**/*.test.tsx,**/*.test.js
sonar.javascript.lcov.reportPaths=webapp/coverage/lcov.info,users/coverage/lcov.info
sonar.rust.lcov.reportPaths=gamey/lcov.info

# Excluir archivos de traducción de la detección de duplicados
# resources.ts contiene diccionarios i18n con claves repetidas en cada idioma
sonar.cpd.exclusions=webapp/src/i18n/resources.ts

# Excluir del reporte de cobertura
# resources.ts es un archivo de datos (strings), no tiene lógica ejecutable en tests
sonar.coverage.exclusions=webapp/src/i18n/resources.ts
